; ============================================================================
;  BET — user Engine.ini override  (created by BETPlayerCap mod workspace)
;  PURPOSE: stop per-frame log spam that drags the listen-server host's CPU.
;
;  Diagnosis: with 7 players, BET.log grew to 76 MB / 405k lines; ~85% of the
;  last 200k lines were a SINGLE per-frame warning:
;    LogTriiodideVoiceChatSynth: Warning: OnGenerateAudio: Playback underrun
;    shortfall=1024 buffered_ms=0.00 room=conf+... player=...
;  i.e. the voice-chat audio synth underruns every frame for every speaker and
;  logs each one (~44-50 lines/frame). Formatting + flushing that to a 76 MB
;  file every frame steals host CPU/disk; the listen server's tick rate drops,
;  so ALL remote clients see high latency and the host's own FPS stutters.
;
;  This file RAISES the log threshold for the noisy categories so they stop
;  being written every frame. It does NOT change gameplay, audio, or netcode —
;  only how verbosely those subsystems log. The underrun itself (a network /
;  voice-buffer issue) is unaffected; this just removes the logging amplifier.
;
;  FULLY REVERSIBLE: delete this file to restore default logging.
;  Verbosity levels (low->high): NoLogging, Fatal, Error, Warning, Display,
;  Log, Verbose, VeryVerbose. Setting a category to "Error" suppresses its
;  Warning/Log/Verbose lines.
; ============================================================================

[Core.Log]
; The 76 MB flood — the voice synth underrun warning. This is THE fix.
; Keep the higher-level voice categories at default verbosity so Join/Subscribe/
; channel diagnostics remain visible when debugging player-specific voice issues.
LogTriiodideVoiceChatSynth=Error
; Optional extra suppression if the remaining voice logs are still too noisy:
; LogTriiodideVoiceChat=Error
; LogBETVoice=Error
; LogEOSVoiceChat=Error
; LogNetPlayerMovement=Error
